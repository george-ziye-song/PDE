# Taylor-Green 2D LoRA Finetuning Configuration (V3 Model)
# Incompressible NS (no tracer), doubly periodic, per-sample nu
# Loss: BC (supervised anchor) + PDE (continuity + momentum)
# Channels: Vx(0), Vy(1), pressure(15)

model_name: taylor_green_lora_v3

model:
  # Must match pretrained V3s model architecture
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128

  vector_channels: 3
  scalar_channels: 15

  # Taylor-Green is 2D
  enable_1d: false
  enable_3d: false

  # Pretrained V3 checkpoint path
  pretrained_path: ./checkpoints_v3_s/best_tf.pt

  # Freeze options
  freeze_encoder: false
  freeze_decoder: false

  # LoRA configuration
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - qkv
      - proj
      - gate_proj
      - up_proj
      - down_proj

training:
  max_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 0
  min_lr: 1.0e-6
  grad_clip: 1.0

  # Loss weights
  lambda_bc: 1.0    # Boundary loss weight (supervised anchor)
  lambda_pde: 0.1   # PDE loss weight

  # Save criterion: save_rmse_weight * val_rmse + save_pde_weight * val_pde
  save_rmse_weight: 100
  save_pde_weight: 1

  # Eval interval (steps)
  eval_interval: 100

  # Early stopping
  early_stopping_patience: 30

  mixed_precision: "no"
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 6
  num_workers: 4
  pin_memory: true

dataset:
  path: ./data/finetune/taylor_green_2d.h5
  seed: 42
  t_input: 8
  train_ratio: 0.9
  clips_per_sample: 200
  val_time_interval: 20
  vector_dim: 2              # 2D velocity (Vx, Vy)

logging:
  project: pde-taylor-green-lora
  entity: null
  save_dir: ./checkpoints_taylor_green_lora_v3
  log_interval: 10

checkpoint:
  resume_from: null

physics:
  nx: 256
  ny: 256
  Lx: 6.283185307179586    # 2*pi
  Ly: 6.283185307179586    # 2*pi
  dt: 0.001
  nu_default: 0.001        # fallback; per-sample nu from dataset
