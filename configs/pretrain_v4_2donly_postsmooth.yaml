# V4 Pretraining - 2D Only with Post-Smooth 5×5
# V2 decoder unchanged + 5×5 Conv after patch reassembly (identity init)
# Init from v4_2donly checkpoint, only decoder.post_smooth is new

model_name: pde_v4_tf_s_3d

model:
  in_channels: 18
  hidden_dim: 768
  patch_size: 16
  patch_size_3d: 16
  num_layers: 12
  num_heads: 12
  dropout: 0.0

  encoder:
    stem_hidden: 128
    stem_out: 256
    use_cnn_pool: false

  intra_patch:
    num_layers: 2
    temporal_window: 3
    num_heads: 8

  na:
    base_kernel: 5

  decoder:
    stem_channels: 256
    hidden_channels: 128
    post_smooth_kernel: 5    # 5×5 Conv for cross-patch boundary smoothing

  vector_channels: 3
  scalar_channels: 15

  enable_1d: false
  enable_3d: false
  gradient_checkpointing: true

training:
  use_fsdp: true
  max_epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  warmup_steps: 200
  min_lr: 1.0e-6
  grad_clip: 1.0
  eval_interval: 200
  early_stopping_patience: 100
  mixed_precision: "no"
  use_compile: false
  gradient_accumulation_steps: 1

dataloader:
  batch_size: 24
  num_workers: 4
  pin_memory: true

dataset:
  path: /scratch-share/SONG0304
  seed: 42
  t_input: 8

  overrides:
    2d_cfd:
      clips_per_epoch: 2000
      val_clips: 12
    swe:
      clips_per_epoch: 2000
      val_clips: 47
    diffusion_reaction:
      clips_per_epoch: 2000
      val_clips: 47

logging:
  project: pde-foundation-v4_2donly_postsmooth
  entity: null
  save_dir: ./checkpoints_v4_2donly_postsmooth
  log_interval: 10

checkpoint:
  resume_from: null
  init_from: /home/msai/song0304/code/PDE/checkpoints_v4_2donly/best_tf.pt
